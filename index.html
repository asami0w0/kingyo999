    <meta charset="UTF-8">

    <style>
        :root {
            --bg-color: #f0f4f8;
            --box-bg: rgba(255, 255, 255, 0.9);
            --text-color: #333;
            --accent-color: #d14d32; /* 金魚の色 */
            --hikari-color: #4a6fa5;
            --hikaru-color: #e6b422;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: #000;
            overflow: hidden;
        }

        /* ゲーム画面全体のコンテナ */
        #game-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            height: 100%;
            margin: 0 auto;
            background-color: var(--bg-color);
            background-image: linear-gradient(to bottom, #a1c4fd 0%, #c2e9fb 100%); /* 仮の背景色 */
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            border-left: 1px solid #ccc;
            border-right: 1px solid #ccc;
        }

        /* 背景画像表示エリア */
        #background-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            z-index: 1;
            transition: background-image 0.5s ease-in-out;
        }

        /* キャラクター立ち絵エリア */
        #character-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            z-index: 2;
            pointer-events: none;
        }

        .character-sprite {
            width: 30%;
            height: 70%;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: bottom;
            transition: all 0.3s ease;
            opacity: 0;
        }

        .character-sprite.active {
            opacity: 1;
        }

        /* メッセージボックス */
        #message-box {
            position: relative;
            z-index: 10;
            background: var(--box-bg);
            margin: 20px;
            padding: 20px;
            border-radius: 10px;
            min-height: 120px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 2px solid rgba(255,255,255,0.5);
        }

        #name-label {
            font-weight: bold;
            font-size: 1.1em;
            margin-bottom: 8px;
            color: var(--accent-color);
        }

        #text-content {
            font-size: 1.05em;
            line-height: 1.6;
            color: var(--text-color);
        }

        /* 選択肢 */
        #choice-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 80%;
            display: none;
        }

        .choice-button {
            background: var(--box-bg);
            padding: 15px;
            border: 2px solid var(--accent-color);
            border-radius: 5px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
        }

        .choice-button:hover {
            background: var(--accent-color);
            color: white;
        }

        /* スタート画面 */
        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        h1 { color: var(--accent-color); margin-bottom: 5px; }
        .subtitle { font-size: 0.9em; color: #666; margin-bottom: 30px; }

        #start-button {
            padding: 15px 40px;
            font-size: 1.2em;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
        }

        /* ログなどのUI */
        #ui-layer {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 30;
        }
        
        /* 簡易的なフェード演出 */
        .fade-in { animation: fadeIn 0.5s forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    </style>
</head>

    if (current.type === 'choice') return;

    if (current.next) {
        currentIndex = scenario.findIndex(
            s => s.label === current.next
        );
    } else {
        currentIndex++;
    }

    if (currentIndex < scenario.length) {
        renderStep();
    }
});

function renderStep() {
    const current = scenario[currentIndex];

    // ロジック分岐の処理
    if (current.type === 'logic') {
        determineEnding();
        return;
    }

    // 選択肢の処理
    if (current.type === 'choice') {
        showChoices(current.choices);
        return;
    }

    // 名前の表示
    nameLabel.textContent = current.name || "";
    // テキストの表示
    textContent.textContent = current.text;

    // キャラクターの表示（簡易）
    if (current.char === 'hikari') {
        spriteHikari.classList.add('active');
        spriteHikaru.classList.remove('active');
        spriteHikari.style.backgroundColor = "rgba(74, 111, 165, 0.3)"; // 仮の立ち絵色
    } else if (current.char === 'hikaru') {
        spriteHikaru.classList.add('active');
        spriteHikari.classList.remove('active');
        spriteHikaru.style.backgroundColor = "rgba(230, 180, 34, 0.3)"; // 仮の立ち絵色
    } else if (current.char === '') {
        spriteHikari.classList.remove('active');
        spriteHikaru.classList.remove('active');
    }

    // 背景の変更（簡易）
    if (current.bg) {
        // bgLayer.style.backgroundImage = `url(${current.bg}.jpg)`; // 画像がある場合はこちら
    }




function showChoices(choices) {
    choiceContainer.innerHTML = '';
    choiceContainer.style.display = 'flex';
    
    choices.forEach(c => {
        const btn = document.createElement('div');
        btn.className = 'choice-button';
        btn.textContent = c.text;
        btn.onclick = () => {
            // ポイント加算
            if (c.points) {
                for (let key in c.points) {
                    state[key] += c.points[key];
                }
            }
            choiceContainer.style.display = 'none';
            currentIndex = scenario.findIndex(s => s.label === c.target);
            renderStep();
        };
        choiceContainer.appendChild(btn);
    });
}

function determineEnding() {
    // 優先順位：金魚沼 > 三人 > 光 = ヒカル
    if (state.fish >= 6) {
        showEnding("金魚沼エンド：増え続ける水槽", "数日後――。座敷には、見覚えのない巨大な水槽が鎮座していた。『この水草もええな……』『次は流木も入れたい……』目を輝かせる佳紀の後ろで、光とヒカルが並んで座っている。『……おれら、最近ほとんど話しかけられてへん』『金魚に負けた……』金魚二匹だけが、今日も悠々と泳いでいた。");
    } else if (state.trio >= 3) {
        showEnding("三人エンド：おれらの方も見て", "『最近、よしき金魚ばっか見とる』『見とるな』二人にじりじりと迫られて、佳紀は眉をひそめた。『……何なん』。光がにやりと笑う。『今日は、おれらでよしきの世話したる』。ヒカルも嬉しそうに頷いた。『ええよな♡』そのまま両側から抱きつかれ、佳紀はベッドへ担がれていく。金魚は何も知らない顔でゆらゆらと泳いでいた。");
    } else if (state.hikari >= state.hikaru) {
        showEnding("光エンド：水面越しの体温", "翌朝――。佳紀と光は、並んで金魚鉢の水を換えていた。『そっち持っとって』『分かっとる』。そんなやり取りをしながら、ふと触れた指先を、光はなかなか離さなかった。『お前が大事にしとるもんは、おれも……それなりに、大事やと思っとるから』。朝の光の中、そう言った光の耳は、少し赤かった。");
    } else {
        showEnding("ヒカルエンド：一番だいじなもの", "夜更け。金魚鉢を覗き込んでいたヒカルが、ふいに佳紀を振り返った。『なあ、よしき。……おれも、よしきのこと、大事にできとる？』真っ直ぐな瞳に、佳紀は少しだけ困った顔で笑う。『当たり前やん』。そう言って頭を撫でると、ヒカルはとても嬉しそうに目を細めた。");
    }

}

function showEnding(title, text) {
    nameLabel.textContent = "【Ending】";
    textContent.innerHTML = `<strong>${title}</strong><br><br>${text}<br><br><button onclick="location.reload()" style="padding:10px; cursor:pointer;">タイトルへ戻る</button>`;
    msgBox.onclick = null; // クリック不可に
    spriteHikari.classList.remove('active');
    spriteHikaru.classList.remove('active');
}
